<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guía Visual: Ciberseguridad en el Hogar</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=DynaPuff:wght@400..700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-border: rgba(255, 255, 255, 0.1);
            --primary: #3b82f6;
        }

        body {
            /* Mantenemos la fuente de interfaz para legibilidad, títulos DynaPuff */
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: #f8fafc;
            overflow-x: hidden;
            min-height: 100vh;
        }

        h1, h2, h3, .dynapuff-font {
            font-family: 'DynaPuff', system-ui;
        }

        /* Fondo dinámico animado (Glassmorphism effect) */
        .ambient-bg {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 50% 50%, #17163b 0%, #0f172a 40%);
            z-index: -1;
            animation: drift 25s ease-in-out infinite alternate;
        }
        @keyframes drift {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-3%, -3%) scale(1.05); }
        }

        /* Contenedor del castillo tipo tarjeta de cristal */
        .castle-wrapper {
            position: relative;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--card-border);
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 1.5rem;
            margin: 0 auto;
            max-width: 900px;
        }

        .castle-container {
            position: relative;
            width: 100%;
            /* Borde interno suave a la imagen */
            border-radius: 0.75rem;
            overflow: hidden; 
        }

        .castle-container img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 0.75rem;
        }

        /* --- ZONAS INTERACTIVAS (Efecto Radar Hotspot) --- */
        .room {
            position: absolute;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(59, 130, 246, 0.5); /* Semitransparente azul */
            border: 2px solid rgba(147, 197, 253, 0.9);
            transform: translate(-50%, -50%); /* Centrado exacto en la coordenada */
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.6);
            z-index: 10;
        }

        /* Círculos pulsantes estilo radar */
        .room::before, .room::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid rgba(96, 165, 250, 0.6);
            animation: pulse-ring 2.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        .room::after {
            animation-delay: 1.25s;
        }

        .room:hover {
            background: rgba(59, 130, 246, 0.9);
            box-shadow: 0 0 30px rgba(96, 165, 250, 0.8), inset 0 0 10px rgba(255, 255, 255, 0.5);
            transform: translate(-50%, -50%) scale(1.15);
            border-color: #ffffff;
        }

        @keyframes pulse-ring {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(2.8); opacity: 0; }
        }

        /* --- MODAL (Estilo moderno superpuesto) --- */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            padding: 1rem;
        }

        .modal.show {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: rgba(30, 41, 59, 0.95);
            border: 1px solid var(--card-border);
            border-radius: 1.5rem;
            width: 100%;
            max-width: 700px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transform: scale(0.95) translateY(20px);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .modal.show .modal-content {
            transform: scale(1) translateY(0);
        }

        .close-btn {
            position: absolute;
            top: 1.25rem;
            right: 1.5rem;
            color: #94a3b8;
            font-size: 2rem;
            line-height: 1;
            cursor: pointer;
            transition: color 0.2s;
            background: none;
            border: none;
            z-index: 10;
        }
        .close-btn:hover { color: white; }

        .modal-header {
            padding: 2rem 2rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.25rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            background: rgba(15, 23, 42, 0.5);
        }

        .modal-icon-container {
            font-size: 2.5rem;
            background: rgba(255,255,255,0.05);
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 1rem;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* --- TABS (Pills Style) --- */
        .tabs-container {
            padding: 0 2rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            background: rgba(15, 23, 42, 0.3);
            overflow-x: auto;
            scrollbar-width: none;
        }
        .tabs-container::-webkit-scrollbar { display: none; }
        
        .tabs {
            display: flex;
            gap: 0.75rem;
            padding: 1.25rem 0;
        }

        .tab-btn {
            background: rgba(255,255,255,0.05);
            color: #cbd5e1;
            padding: 0.5rem 1.25rem;
            border-radius: 9999px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            border: 1px solid transparent;
        }

        .tab-btn:hover {
            color: white;
            background: rgba(255,255,255,0.1);
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            border-color: rgba(96, 165, 250, 0.5);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        /* --- CONTENIDO DEL MODAL --- */
        .modal-body {
            padding: 2rem;
            overflow-y: auto;
            flex: 1;
        }

        .tab-content {
            display: none;
            animation: slideUpFade 0.4s ease forwards;
        }

        .tab-content.active { display: block; }
        
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Textos base */
        .tab-content p {
            color: #cbd5e1;
            line-height: 1.6;
            margin-bottom: 1.5rem;
            font-size: 1.05rem;
        }

        /* Estilos de PDF Links */
        .tab-content a {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(59, 130, 246, 0.15);
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, 0.3);
            transition: all 0.2s ease;
            text-decoration: none;
            font-weight: 500;
            margin-left: 0.5rem;
        }
        .tab-content a:hover {
            background: rgba(59, 130, 246, 0.3);
            color: white;
            box-shadow: 0 0 15px rgba(59,130,246,0.3);
            transform: translateY(-2px);
        }

        /* --- TIPS (Alertas estilo Toasts Modernas) --- */
        .tip {
            display: flex;
            align-items: flex-start;
            gap: 1.25rem;
            padding: 1.25rem;
            border-radius: 1rem;
            margin-bottom: 1rem;
            border: 1px solid transparent;
            backdrop-filter: blur(10px);
            line-height: 1.5;
            font-size: 0.95rem;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .tip:hover { 
            transform: translateX(4px); 
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .tip strong { color: white; display: block; margin-bottom: 0.25rem; font-size: 1rem; }
        
        .tip-icon {
            font-size: 1.5rem;
            flex-shrink: 0;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(0,0,0,0.2);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .tip-green {
            background: rgba(16, 185, 129, 0.1);
            border-color: rgba(16, 185, 129, 0.25);
            color: #d1fae5;
        }
        .tip-green .tip-icon { color: #34d399; }
        
        .tip-yellow {
            background: rgba(245, 158, 11, 0.1);
            border-color: rgba(245, 158, 11, 0.25);
            color: #fef3c7;
        }
        .tip-yellow .tip-icon { color: #fbbf24; }
        
        .tip-red {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.25);
            color: #fee2e2;
        }
        .tip-red .tip-icon { color: #f87171; }

        /* Estilos de Utilidad Gradient */
        .text-gradient {
            background: linear-gradient(135deg, #60a5fa 0%, #c084fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>

                <div id="kitchen-room" class="room" style="top: 48.5%; right: 33%;" title="La Cocina"></div>

        </div>

        </footer>
    </div>

            <div id="modal-body" class="modal-body">
                <!-- El contenido se inyectará aquí -->
            </div>
        </div>
    </div>

        // --- Selectores del DOM ---
        const modal = document.getElementById('modal-template');
        const modalIcon = document.getElementById('modal-icon');
        const modalTitle = document.getElementById('modal-title');
        const modalBody = document.getElementById('modal-body');
        const modalTabsContainer = document.getElementById('modal-tabs');
        const closeBtn = document.querySelector('.close-btn');

        // --- Asignar Eventos ---
        document.querySelectorAll('.room').forEach(room => {
            room.addEventListener('click', () => {
                const roomData = modalData[room.id];
                if (roomData) {
                    openModal(roomData);
                }
            });
        });

        modalTabsContainer.addEventListener('click', (e) => {
            if (e.target.classList.contains('tab-btn')) {
                const tabName = e.target.getAttribute('data-tab');
                activateTab(tabName);
            }
        });

        // Evento para cerrar la ventana (Transición suave)
        function closeModal() {
            modal.classList.remove('show');
            setTimeout(() => {
                modal.style.display = 'none';
            }, 300); // Wait for transition CSS to finish
            document.body.style.overflow = '';
        }

        closeBtn.onclick = closeModal;

        // Clic fuera del modal para cerrar
        window.onclick = (event) => {
            if (event.target == modal) {
                closeModal();
            }
        };

        // Tecla escape para cerrar
        window.onkeydown = (event) => {
            if(event.key === 'Escape' && modal.classList.contains('show')) {
                closeModal();
            }
        };

        // --- Funciones ---
        function openModal(data) {
            modalIcon.textContent = data.icon;
            modalTitle.textContent = data.title;
            
            modalBody.innerHTML = ''; // Limpiar
            
            for (const tab in data.content) {
                const contentDiv = document.createElement('div');
                contentDiv.id = `content-${tab}`;
                contentDiv.className = 'tab-content';
                contentDiv.innerHTML = data.content[tab];
                modalBody.appendChild(contentDiv);
            }
            
            modal.style.display = 'flex';
            // Allow display swap before adding opacity class
            setTimeout(() => {
                modal.classList.add('show');
            }, 10);
            
            document.body.style.overflow = 'hidden'; // Evitar scroll
            activateTab('adultos');
        }

        function activateTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('data-tab') === tabName) {
                    btn.classList.add('active');
                }
            });
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
                if (content.id === `content-${tabName}`) {
                    content.classList.add('active');
                }
            });
        }
    </script>
